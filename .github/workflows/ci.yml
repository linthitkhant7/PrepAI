name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: List available Xcodes
        run: ls /Applications/ | grep Xcode
      
      - name: List simulator runtimes
        run: xcrun simctl list runtimes