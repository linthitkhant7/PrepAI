name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: Run tests
        run: |
          xcodebuild test \
            -scheme PrepAI \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -resultBundlePath TestResults