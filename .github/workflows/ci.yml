name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      
      - name: Run tests
        run: |
          xcodebuild test \
            -scheme PrepAI \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -resultBundlePath TestResults